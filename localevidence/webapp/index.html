<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LocalEvidence">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<title>LocalEvidence</title>
<style>
  :root{
    --bg:#0b1220; --panel:#121b2e; --panel2:#0f1728; --line:#1f2c44;
    --text:#e7edf6; --dim:#93a3bd; --teal:#2dd4bf; --teal-d:#0f766e;
    --amber:#f5b14c; --red:#f87171;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f6f8fb; --panel:#fff; --panel2:#f0f3f8; --line:#e3e9f2;
           --text:#0e1726; --dim:#5b6b86; --teal:#0d9488; --teal-d:#0f766e; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
  header{position:sticky;top:0;z-index:5;background:var(--bg);
    padding:calc(env(safe-area-inset-top) + 14px) 18px 10px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{width:26px;height:26px}
  .brand b{font-size:18px;letter-spacing:.2px}
  .stat{color:var(--dim);font-size:12px;margin-top:2px}
  main{max-width:760px;margin:0 auto;padding:16px 14px 40px}
  .ask{display:flex;gap:8px;margin-bottom:6px}
  .ask textarea{flex:1;resize:none;background:var(--panel);color:var(--text);
    border:1px solid var(--line);border-radius:14px;padding:12px 14px;font:inherit;min-height:52px}
  .ask button{background:var(--teal-d);color:#fff;border:0;border-radius:14px;
    padding:0 18px;font-weight:600;font-size:15px}
  .ask button:active{opacity:.8}
  .hint{color:var(--dim);font-size:12px;margin:2px 4px 18px}
  .result{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:16px 18px;margin-bottom:18px;display:none}
  .result.show{display:block}
  .pill{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;
    letter-spacing:.5px;padding:3px 9px;border-radius:999px;margin-right:6px}
  .pill.high{background:rgba(45,212,191,.15);color:var(--teal)}
  .pill.moderate{background:rgba(245,177,76,.16);color:var(--amber)}
  .pill.low{background:rgba(248,113,113,.16);color:var(--red)}
  .pill.queued{background:rgba(147,163,189,.18);color:var(--dim)}
  h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);
    margin:22px 0 8px}
  .list a{display:block;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:13px 15px;margin-bottom:9px;color:var(--text);text-decoration:none}
  .list a:active{background:var(--panel2)}
  .list .q{font-weight:600;line-height:1.35}
  .list .meta{color:var(--dim);font-size:12px;margin-top:4px}
  .md h1,.md h2,.md h3{line-height:1.25;margin:18px 0 8px}
  .md h1{font-size:20px}.md h2{font-size:17px}.md h3{font-size:15px}
  .md p{margin:8px 0}
  .md ul{margin:8px 0;padding-left:20px}.md li{margin:4px 0}
  .md blockquote{margin:10px 0;padding:8px 14px;border-left:3px solid var(--teal-d);
    background:var(--panel2);border-radius:0 10px 10px 0;color:var(--text)}
  .md code{background:var(--panel2);padding:1px 5px;border-radius:5px;font-size:13px}
  .md a{color:var(--teal)}
  .md table{border-collapse:collapse;width:100%;margin:10px 0;font-size:14px;display:block;overflow-x:auto}
  .md td,.md th{border:1px solid var(--line);padding:6px 9px;text-align:left}
  .ev{border-top:1px solid var(--line);margin-top:10px;padding-top:10px}
  .ev .src{font-size:13px;color:var(--dim);margin:10px 0 3px;font-weight:600}
  .ev .snip{font-size:13px;color:var(--text);opacity:.85}
  .back{color:var(--teal);font-size:14px;display:inline-block;margin-bottom:8px;cursor:pointer}
  .offline{background:var(--amber);color:#1a1206;text-align:center;font-size:12px;
    font-weight:600;padding:5px;display:none}
  .offline.show{display:block}
  .spin{color:var(--dim);font-size:14px}
</style>
</head>
<body>
<div class="offline" id="offline">Offline — showing cached answers</div>
<header>
  <div class="brand"><img src="icon.svg" alt=""><b>LocalEvidence</b></div>
  <div class="stat" id="stat">loading…</div>
</header>
<main>
  <div class="ask">
    <textarea id="q" placeholder="Ask a clinical question…" rows="1"></textarea>
    <button id="ask">Ask</button>
  </div>
  <div class="hint" id="hint">Warm questions answer instantly; novel ones queue for the next deep run.</div>
  <div class="result" id="result"></div>
  <h2 class="sec" id="listhdr">Worked answers</h2>
  <div class="list" id="list"></div>
</main>
<script src="app.js"></script>
</body>
</html>
