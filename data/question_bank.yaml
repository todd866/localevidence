# LocalEvidence simulated-question bank.
#
# Self-play questions used by `localevidence load` to warm the system: pre-acquire
# the corpus, build the persistent passage index, and populate the knowledge
# ledger for the topics you actually work in. This ships as a generic
# clinical/paediatric example — replace it with your own domains. Each entry runs
# through the full `ask` loop. `queries` are optional focused discovery strings.

- topic: eating-disorders
  question: "In anorexia nervosa with bradycardia, what heart rate threshold warrants inpatient medical admission?"
  queries: ["anorexia nervosa medical admission criteria bradycardia", "MARSIPAN management really sick anorexia"]

- topic: eating-disorders
  question: "How should refeeding syndrome be prevented and managed when refeeding a severely malnourished patient with anorexia nervosa?"
  queries: ["refeeding syndrome anorexia nervosa phosphate management", "refeeding hypophosphataemia prevention guideline"]

- topic: eating-disorders
  question: "What is the evidence for the GLP-1 / appetite-regulation hypothesis in anorexia nervosa?"
  queries: ["GLP-1 anorexia nervosa appetite", "GLP-1 agonist eating disorder"]

- topic: eating-disorders
  question: "When is compulsory nasogastric feeding justified in a patient with severe anorexia nervosa refusing food?"
  queries: ["compulsory nasogastric feeding anorexia nervosa ethics", "involuntary refeeding eating disorder legal"]

- topic: psychiatry
  question: "How should lithium toxicity severity be assessed and when is haemodialysis indicated?"
  queries: ["lithium poisoning extracorporeal treatment EXTRIP", "lithium intoxication haemodialysis indications"]

- topic: psychiatry
  question: "What is the first-line benzodiazepine choice for alcohol withdrawal in a patient with significant liver disease?"
  queries: ["alcohol withdrawal benzodiazepine liver disease lorazepam diazepam", "alcohol withdrawal cirrhosis benzodiazepine"]

- topic: psychiatry
  question: "How is serotonin syndrome distinguished from neuroleptic malignant syndrome, and how is each managed?"
  queries: ["serotonin syndrome neuroleptic malignant syndrome differentiation management"]

- topic: psychiatry
  question: "What is the evidence and monitoring requirement for clozapine-induced myocarditis?"
  queries: ["clozapine myocarditis monitoring troponin", "clozapine cardiac monitoring guideline"]

- topic: psychiatry
  question: "How should a first episode of psychosis be worked up to exclude organic causes?"
  queries: ["first episode psychosis organic workup investigations", "secondary psychosis medical causes"]

- topic: emergency
  question: "What is the current approach to risk-stratifying and managing serotonergic overdose in the emergency department?"
  queries: ["antidepressant overdose serotonin toxicity emergency management"]

- topic: emergency
  question: "How should suspected NMDA-receptor encephalitis presenting with psychiatric symptoms be investigated?"
  queries: ["anti-NMDA receptor encephalitis psychiatric presentation diagnosis"]

- topic: emergency
  question: "What are the indications for and risks of physical restraint and rapid tranquillisation in acute agitation?"
  queries: ["rapid tranquillisation acute agitation guideline safety"]

- topic: general-medicine
  question: "How is the severity of community-acquired pneumonia assessed to decide admission versus outpatient management?"
  queries: ["community acquired pneumonia severity CURB-65 admission"]

- topic: general-medicine
  question: "What is the evidence-based approach to managing hyponatraemia by acuity and symptom severity?"
  queries: ["hyponatraemia management acute symptomatic correction guideline"]

- topic: general-medicine
  question: "When should venous thromboembolism prophylaxis be given to medical inpatients, and what are the contraindications?"
  queries: ["VTE prophylaxis medical inpatients risk assessment contraindications"]

- topic: general-medicine
  question: "How should diabetic ketoacidosis be diagnosed and managed, including fluid and insulin protocols?"
  queries: ["diabetic ketoacidosis management protocol fluids insulin"]

